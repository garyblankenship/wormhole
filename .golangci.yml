version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/prism-php/prism-go

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - dupl
    - goconst
    - gocyclo
    - misspell
    - unparam
    - nakedret
    - prealloc
    - bodyclose
    - rowserrcheck
    - copyloopvar
  settings:
    govet:
      enable: []
    gocyclo:
      min-complexity: 25
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 3
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - dupl
      - path: examples/
        linters:
          - goconst
          - gocyclo
      - linters:
          - staticcheck
        text: "ST1000:"
      - path: pkg/providers/transform/streaming\.go
        linters:
          - gocyclo
      - path: pkg/middleware/adapter\.go
        linters:
          - dupl
      - path: pkg/middleware/typed_enhanced_metrics\.go
        linters:
          - dupl
