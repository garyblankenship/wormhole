version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...
    - go vet ./...
    - golangci-lint run ./...

builds:
  - skip: true  # This is a library, not a binary

archives:
  - formats:
      - tar.gz
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE
      - docs/**/*
      - examples/**/*
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^build:'
      - merge conflict
      - Merge pull request

release:
  github:
    owner: garyblankenship
    name: wormhole
  
  draft: false
  prerelease: auto
  mode: append
  
  header: |
    # Wormhole {{ .Tag }}

    Wormhole is a Go provider bridge for app-facing LLM workflows: text,
    streaming, structured output, embeddings, reranking, tool calling, media,
    and an OpenAI-compatible proxy.

    It keeps provider administration such as files, fine-tuning, batches,
    assistants, vector stores, and realtime APIs in the official provider SDKs.
  
  footer: |
    ## Installation
    ```bash
    go get github.com/garyblankenship/wormhole/v2@{{ .Tag }}
    ```
    
    ## Quick Start
    ```go
    client := wormhole.New(
        wormhole.WithOpenAI("your-api-key"),
        wormhole.WithDefaultProvider("openai"),
    )
    
    response, err := client.Text().
        Model("gpt-5").
        Prompt("Hello, Wormhole!").
        Generate(context.Background())
    ```
    
    ## Resources
    - [Documentation](https://pkg.go.dev/github.com/garyblankenship/wormhole/v2@{{ .Tag }})
    - [Examples](https://github.com/garyblankenship/wormhole/tree/{{ .Tag }}/examples)
    - [Changelog](https://github.com/garyblankenship/wormhole/blob/{{ .Tag }}/CHANGELOG.md)

env:
  - GO111MODULE=on

git:
  ignore_tags:
    - "nightly"
